{% extends 'immobilier/base.html' %}
{% block title %}Supprimer une intervention{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3"></i>
                <h4>Confirmer la suppression</h4>
                <p class="text-muted">Supprimer l'intervention <strong>"{{ intervention.titre }}"</strong> ?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Confirmer</button>
                    <a href="{% url 'immobilier:intervention_detail' intervention.pk %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
